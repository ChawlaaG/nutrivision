name: nutrivision_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.3+6

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Local Database & Storage
  sqflite: ^2.3.0
  path: ^1.9.0
  shared_preferences: ^2.2.0
  
  # AI & Camera
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  permission_handler: ^11.3.0
  
  # Networking & API
  http: ^1.2.0
  mobile_scanner: ^5.0.0
  supabase_flutter: ^2.3.0

  
  # UI Polish
  fl_chart: ^0.66.0
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.1.0
  gap: ^3.0.1
  go_router: ^13.0.0

  # Play Store Features
  flutter_local_notifications: ^18.0.1
  flutter_native_splash: "^2.3.1"
  in_app_review: ^2.0.11
  speech_to_text: ^7.3.0
  health: ^13.2.1
  package_info_plus: ^9.0.0
  file_picker: ^10.3.7
  share_plus: ^12.0.1
  image: ^4.1.3
  csv: ^6.0.0
  path_provider: ^2.1.5
  smooth_page_indicator: ^1.2.1
  lottie: ^3.3.2
  flutter_slidable: ^4.0.3
  confetti: ^0.8.0
  google_sign_in: ^6.2.1
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/nutrivision_app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/nutrivision_app_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/icon/nutrivision_app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/nutrivision_app_icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/icon/nutrivision_app_icon.png"
  android_12:
    image: "assets/icon/nutrivision_app_icon.png"
    color: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/data/
